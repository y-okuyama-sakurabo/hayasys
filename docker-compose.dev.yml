services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
      TZ: Asia/Tokyo
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    working_dir: /app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_NAME: app
      DB_USER: app
      DB_PASSWORD: app
      DB_HOST: db
      DB_PORT: "5432"
      TZ: Asia/Tokyo
      DEBUG: "1"
      ALLOWED_HOSTS: "*"
    command: >
      bash -lc "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.dev
    working_dir: /usr/src/app
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: "/api"
      # Windows + Docker でファイル変更を検知するためのポーリング設定
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/usr/src/app          # ソースをマウント（変更がすぐ反映される）
      - /usr/src/app/node_modules        # コンテナ内の node_modules を保持
      - /usr/src/app/.next              # .next キャッシュを保持
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  db-data: {}
