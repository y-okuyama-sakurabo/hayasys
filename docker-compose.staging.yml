services:
  db:
    image: postgres:15-alpine
    container_name: staging_db
    environment:
      POSTGRES_USER: staging
      POSTGRES_PASSWORD: staging
      POSTGRES_DB: staging
      TZ: Asia/Tokyo
    volumes:
      - staging-db-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ./docker/backend/Dockerfile
    container_name: staging_backend
    working_dir: /app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_NAME: staging
      DB_USER: staging
      DB_PASSWORD: staging
      DB_HOST: db
      DB_PORT: "5432"
      TZ: Asia/Tokyo
      DEBUG: "0"
      ALLOWED_HOSTS: "*"
    command: >
      bash -lc "
        python manage.py migrate &&
        python manage.py loaddata core/fixtures/seed_customerclass.json &&
        python manage.py loaddata core/fixtures/regions_47.json &&
        python manage.py loaddata core/fixtures/shops_seed.json &&
        python manage.py loaddata core/fixtures/gender_seed.json &&
        python manage.py loaddata core/fixtures/colors.json &&
        python manage.py seed_units &&
        python manage.py seed_payment_companies &&
        python manage.py import_manufacturer_groups manufacturer_groups.csv &&
        python manage.py import_manufacturer manufacturers.csv &&
        python manage.py import_categories categories.csv &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
      "
    ports:
      - "8001:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.prod
    container_name: staging_frontend
    working_dir: /usr/src/app
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: "/api"
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  staging-db-data: {}
